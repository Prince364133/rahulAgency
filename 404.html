<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1b4332">
  <title>Page Not Found — Hammer of Thor</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="img/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
    .box{background:#fff;border-radius:24px;padding:50px 40px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
    h1{font-size:5rem;color:#1a5c38;line-height:1}
    h2{font-size:1.5rem;color:#333;margin:16px 0 8px}
    p{color:#888;margin-bottom:30px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:50px;text-decoration:none;font-weight:700;margin:6px;cursor:pointer}
    .btn-green{background:#1a5c38;color:#fff}
    .btn-wa{background:#25d366;color:#fff}
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:4rem;margin-bottom:10px">🔍</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="index.html" class="btn btn-green"><i class="fas fa-home"></i> Go to Home Page</a>
    <a href="javascript:void(0)" class="btn btn-wa"><i class="fab fa-whatsapp"></i> Support on WhatsApp</a>
  </div>
</body>
</html>
